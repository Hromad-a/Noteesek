# Noteesek — production deploy. One container bundles the Flutter web app, the
# PocketBase API, and the schema (migrations + hooks baked into the image). The
# only external state is ./pb_data next to this file.
#
#   docker compose pull && docker compose up -d
#
# Open http://localhost:8090/ — app at /, REST API at /api, admin at /_/.
# Back up by copying ./pb_data. Copy .env.example to .env to set the version,
# port, admin bootstrap, and SMTP (all optional).
#
# To build the image from source instead of pulling, use docker-compose.build.yml.
services:
  noteesek:
    image: ghcr.io/hromad-a/noteesek:${NOTEESEK_VERSION:-latest}
    container_name: noteesek
    restart: unless-stopped
    # Optional config read by the container at startup: superuser bootstrap
    # (PB_SUPERUSER_*) and outgoing mail (SMTP_*, APP_URL). See .env.example.
    env_file:
      - path: .env
        required: false
    ports:
      # host : container. The container always listens on 8080.
      - "${NOTEESEK_PORT:-8090}:8080"
    volumes:
      # Persistent runtime state (database + uploaded files). Keep/back this up.
      - ./pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
