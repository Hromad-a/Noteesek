# Deploy Noteesek on any machine with Docker — no source checkout or build.
#
#   docker compose up -d
#
# This pulls a prebuilt image from the GitHub Container Registry. The image
# bundles the Flutter web app, the PocketBase server, and the schema migrations,
# so a fresh machine comes up fully configured. Open http://localhost:8090/
#
# Persistent data lives in ./pb_data next to this file — back it up by copying
# that folder. Pin a specific version with NOTEESEK_VERSION (see .env.example).
#
# (The build-from-source compose used for development is in server/.)
services:
  noteesek:
    image: ghcr.io/hromad-a/noteesek:${NOTEESEK_VERSION:-latest}
    container_name: noteesek
    restart: unless-stopped
    ports:
      # host : container. Change the host side (or set NOTEESEK_PORT) to serve
      # on a different port. The container always listens on 8080.
      - "${NOTEESEK_PORT:-8090}:8080"
    volumes:
      # PocketBase runtime state (database, uploaded files). Keep/back this up.
      - ./pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
