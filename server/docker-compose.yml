services:
  pocketbase:
    build:
      # Context is the repo root so the image can also build the Flutter web app
      # (app/). Bind-mount paths below stay relative to this compose file.
      context: ..
      dockerfile: server/Dockerfile
      args:
        PB_VERSION: "0.39.1"
    container_name: noteesek-pocketbase
    restart: unless-stopped
    # Optional superuser bootstrap. Set these (e.g. in a `.env` file next to this
    # compose file, or in the shell) to create/update the admin on every boot.
    # Leave unset to manage the superuser manually via /_/ or the CLI. Password
    # must be at least 8 characters.
    environment:
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL:-}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD:-}
      # SMTP / mail (optional) — set SMTP_HOST to enable. See .env.example.
      # APP_URL: leave empty to auto-derive the reset-link origin from the
      # request; set it only to override (e.g. behind a proxy).
      APP_URL: ${APP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_AUTH_METHOD: ${SMTP_AUTH_METHOD:-PLAIN}
      SMTP_LOCALNAME: ${SMTP_LOCALNAME:-}
      SMTP_SENDER_ADDRESS: ${SMTP_SENDER_ADDRESS:-}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Noteesek}
    ports:
      - "8090:8080"
    volumes:
      # Persistent data — gitignored. Back up by copying this folder.
      - ./pb_data:/pb/pb_data
      # Schema as code — applied automatically on startup.
      - ./pb_migrations:/pb/pb_migrations
      # Optional custom JS hooks.
      - ./pb_hooks:/pb/pb_hooks
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
