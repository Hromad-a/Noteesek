name: Build & publish APK

# On a semver tag push, builds the Android release APK and attaches it to the
# GitHub Release for that tag, e.g.:
#
#   git tag v0.2.0 && git push origin v0.2.0
#   -> Release v0.2.0 with asset noteesek-0.2.0.apk
#
# The APK uses the app's current (debug) signing config — installable directly
# on a device ("allow unknown sources"), but not Play-Store-ready. Swap in a
# release keystore + signingConfig later for store distribution.
#
# `workflow_dispatch` lets you re-run against an existing tag from the Actions
# tab (pick the tag as the ref).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release and upload the APK asset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Decode the release keystore from secrets so every release is signed with
      # the SAME key (installs update in place, no uninstall). If the secret is
      # unset the build falls back to debug signing — see app/android/build.gradle.kts.
      # Required repo secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      # ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS.
      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — building debug-signed APK (will require uninstall to update)."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/android/app/release.jks
          cat > app/android/key.properties <<EOF
          storeFile=release.jks
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          EOF

      - name: Build release APK
        working-directory: app
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          # BUILD_SOURCE=ci marks this as an official release in Settings → About
          # (a local `flutter build apk` leaves it empty → "Local build").
          # GIT_SHA + BUILD_DATE are shown under the version.
          flutter build apk --release \
            --dart-define=BUILD_SOURCE=ci \
            --dart-define=GIT_SHA="$(git rev-parse --short HEAD)" \
            --dart-define=BUILD_DATE="$(date -u +%Y-%m-%d)"

      - name: Stage APK with versioned name
        run: |
          mkdir -p dist
          cp app/build/app/outputs/flutter-apk/app-release.apk \
             "dist/noteesek-${{ steps.ver.outputs.version }}.apk"

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/noteesek-${{ steps.ver.outputs.version }}.apk
          fail_on_unmatched_files: true
