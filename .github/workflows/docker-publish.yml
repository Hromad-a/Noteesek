name: Publish Docker image

# Builds a multi-arch (amd64 + arm64) image and pushes it to the GitHub
# Container Registry whenever a semver tag is pushed, e.g.:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Produces image tags 0.2.0, 0.2, 0 and (for the newest non-prerelease) latest:
#   ghcr.io/hromad-a/noteesek:0.2.0
#   ghcr.io/hromad-a/noteesek:latest
#
# `workflow_dispatch` lets you re-run the build manually from the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables building the arm64 variant on the amd64 runner. Only the
      # small Alpine/PocketBase stage runs emulated; the heavy Flutter build is
      # pinned to the native build platform in the Dockerfile.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags + OCI labels from the git ref. metadata-action
      # lowercases the image name (Hromad-a -> hromad-a) and, with the default
      # latest=auto flavor, also tags `latest` for non-prerelease semver tags.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PB_VERSION=0.39.1
          cache-from: type=gha
          cache-to: type=gha,mode=max
